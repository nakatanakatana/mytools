apiVersion: v1
kind: Service
metadata:
  name: nostr-relay-protocol
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: nostr-relay
  ports:
    - {name: websocket, port: 8080, targetPort: protocol}
---
# Keep this Service cluster-private and allow only nostr-bridge to reach it.
apiVersion: v1
kind: Service
metadata:
  name: nostr-relay-management
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: nostr-relay
  ports:
    - {name: http, port: 8081, targetPort: management}
