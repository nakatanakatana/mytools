id = "nakatanakatana.tabinfo"
name = "Tab Info"
version = "0.1.0"
min_herdr_version = "0.7.0"
description = "Rewrite Herdr tab labels with live tab information."
platforms = ["linux", "macos"]

[[build]]
command = ["go", "build", "-o", "bin/herdr-plugin-tabinfo", "."]

[[events]]
on = "workspace.created"
command = ["bin/herdr-plugin-tabinfo", "event"]

[[events]]
on = "workspace.updated"
command = ["bin/herdr-plugin-tabinfo", "event"]

[[events]]
on = "workspace.closed"
command = ["bin/herdr-plugin-tabinfo", "event"]

[[events]]
on = "workspace.focused"
command = ["bin/herdr-plugin-tabinfo", "event"]

[[events]]
on = "workspace.renamed"
command = ["bin/herdr-plugin-tabinfo", "event"]

[[events]]
on = "workspace.moved"
command = ["bin/herdr-plugin-tabinfo", "event"]

[[events]]
on = "tab.created"
command = ["bin/herdr-plugin-tabinfo", "event"]

[[events]]
on = "tab.closed"
command = ["bin/herdr-plugin-tabinfo", "event"]

[[events]]
on = "tab.focused"
command = ["bin/herdr-plugin-tabinfo", "event"]

[[events]]
on = "tab.moved"
command = ["bin/herdr-plugin-tabinfo", "event"]

[[events]]
on = "tab.renamed"
command = ["bin/herdr-plugin-tabinfo", "event"]

[[events]]
on = "pane.created"
command = ["bin/herdr-plugin-tabinfo", "event"]

[[events]]
on = "pane.closed"
command = ["bin/herdr-plugin-tabinfo", "event"]

[[events]]
on = "pane.focused"
command = ["bin/herdr-plugin-tabinfo", "event"]

[[events]]
on = "pane.moved"
command = ["bin/herdr-plugin-tabinfo", "event"]

[[events]]
on = "pane.exited"
command = ["bin/herdr-plugin-tabinfo", "event"]

[[events]]
on = "pane.agent_detected"
command = ["bin/herdr-plugin-tabinfo", "event"]

[[events]]
on = "pane.agent_status_changed"
command = ["bin/herdr-plugin-tabinfo", "event"]

[[events]]
on = "layout.updated"
command = ["bin/herdr-plugin-tabinfo", "event"]
