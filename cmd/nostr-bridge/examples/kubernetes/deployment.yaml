apiVersion: apps/v1
kind: Deployment
metadata:
  name: nostr-bridge
  labels: &labels
    app.kubernetes.io/name: nostr-bridge
spec:
  # SQLite and the ReadWriteOnce PVC require a single writer.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: nostr-bridge
  template:
    metadata:
      labels: *labels
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: bridge
          image: ghcr.io/nakatanakatana/nostr-bridge:latest # Pin a release or digest.
          imagePullPolicy: IfNotPresent
          ports:
            - {name: http, containerPort: 8080}
          env:
            - {name: NOSTR_BRIDGE_HOST, value: 0.0.0.0}
            - {name: NOSTR_BRIDGE_PORT, value: "8080"}
            - {name: NOSTR_BRIDGE_DATABASE_PATH, value: /var/lib/nostr-bridge/bridge.db}
            - {name: NOSTR_BRIDGE_RELAY_URL, value: REPLACE_WITH_RELAY_WS_URL}
            - {name: NOSTR_BRIDGE_RELAY_MANAGEMENT_URL, value: REPLACE_WITH_PRIVATE_RELAY_MANAGEMENT_URL}
            - {name: NOSTR_BRIDGE_RELAY_CANONICAL_URL, value: REPLACE_WITH_CANONICAL_RELAY_HTTPS_URL}
            - {name: NOSTR_BRIDGE_OAUTH_AUTHORIZATION_SERVER_URL, value: https://bsky.social}
            - {name: NOSTR_BRIDGE_BLUESKY_BASE_URL, value: https://bsky.social}
            - {name: NOSTR_BRIDGE_JETSTREAM_URL, value: wss://jetstream2.us-east.bsky.network/subscribe}
            - {name: NOSTR_BRIDGE_OAUTH_CLIENT_ID, value: REPLACE_WITH_PUBLIC_CLIENT_METADATA_URL}
            - {name: NOSTR_BRIDGE_OAUTH_CALLBACK_URL, value: REPLACE_WITH_OAUTH_CALLBACK_URL}
            - {name: NOSTR_BRIDGE_ACCOUNT_DID, value: REPLACE_WITH_ACCOUNT_DID}
            - name: NOSTR_BRIDGE_RELAY_ADMIN_PRIVATE_KEY
              valueFrom: {secretKeyRef: {name: nostr-bridge-secrets, key: relay-admin-private-key}}
            - name: NOSTR_BRIDGE_MASTER_SEED
              valueFrom: {secretKeyRef: {name: nostr-bridge-secrets, key: master-seed}}
            - name: NOSTR_BRIDGE_OAUTH_CLIENT_SIGNING_KEY
              valueFrom: {secretKeyRef: {name: nostr-bridge-secrets, key: oauth-client-signing-key}}
            - name: NOSTR_BRIDGE_OAUTH_ENCRYPTION_KEY
              valueFrom: {secretKeyRef: {name: nostr-bridge-secrets, key: oauth-encryption-key}}
          readinessProbe:
            httpGet: {path: /readyz, port: http}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /healthz, port: http}
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests: {cpu: 100m, memory: 128Mi}
            limits: {memory: 512Mi}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: [ALL]}
            readOnlyRootFilesystem: true
          volumeMounts:
            - {name: data, mountPath: /var/lib/nostr-bridge}
            - {name: tmp, mountPath: /tmp}
      volumes:
        - name: data
          persistentVolumeClaim: {claimName: nostr-bridge-data}
        - name: tmp
          emptyDir: {}
