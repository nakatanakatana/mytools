apiVersion: apps/v1
kind: Deployment
metadata:
  name: nostr-bridge
  labels: &labels
    app.kubernetes.io/name: nostr-bridge
spec:
  # SQLite and the ReadWriteOnce PVC require a single writer.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: nostr-bridge
  template:
    metadata:
      labels: *labels
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: bridge
          image: ghcr.io/nakatanakatana/nostr-bridge:latest # Pin a release or digest.
          imagePullPolicy: IfNotPresent
          ports:
            - {name: http, containerPort: 8080}
          env:
            - {name: NOSTR_BRIDGE_HOST, value: 0.0.0.0}
            - {name: NOSTR_BRIDGE_PORT, value: "8080"}
            - {name: NOSTR_BRIDGE_DATABASE_PATH, value: /var/lib/nostr-bridge/bridge.db}
            - {name: NOSTR_BRIDGE_RELAY_URL, value: REPLACE_WITH_RELAY_WS_URL}
            - {name: NOSTR_BRIDGE_RELAY_MANAGEMENT_URL, value: REPLACE_WITH_PRIVATE_RELAY_MANAGEMENT_URL}
            - {name: NOSTR_BRIDGE_RELAY_CANONICAL_URL, value: REPLACE_WITH_CANONICAL_RELAY_HTTPS_URL}
            - {name: NOSTR_BRIDGE_OWNER_ID, value: REPLACE_WITH_STABLE_OWNER_ID}
            - {name: NOSTR_BRIDGE_OWNER_NAME, value: nostr-bridge}
            - {name: NOSTR_BRIDGE_OWNER_ABOUT, value: Posts bridged from social accounts}
            - {name: NOSTR_BRIDGE_OWNER_PICTURE, value: https://REPLACE_WITH_OWNER_PICTURE_URL}
            - {name: NOSTR_BRIDGE_BLUESKY_BASE_URL, value: https://bsky.social}
            - {name: NOSTR_BRIDGE_BLUESKY_ACCOUNT_DID, value: REPLACE_WITH_ACCOUNT_DID}
            - {name: NOSTR_BRIDGE_BLUESKY_JETSTREAM_URL, value: wss://jetstream2.us-east.bsky.network/subscribe}
            - {name: NOSTR_BRIDGE_BLUESKY_LIST_URIS, value: REPLACE_WITH_COMMA_SEPARATED_LIST_URIS}
            - {name: NOSTR_BRIDGE_BLUESKY_BACKFILL_LIMIT, value: "100"}
            - {name: NOSTR_BRIDGE_BLUESKY_RECONCILE_INTERVAL, value: 1h}
            - {name: NOSTR_BRIDGE_BLUESKY_OAUTH_AUTHORIZATION_SERVER_URL, value: https://bsky.social}
            - {name: NOSTR_BRIDGE_BLUESKY_OAUTH_CLIENT_ID, value: https://REPLACE_WITH_PUBLIC_HOST/oauth/bluesky/client-metadata.json}
            - {name: NOSTR_BRIDGE_BLUESKY_OAUTH_CALLBACK_URL, value: https://REPLACE_WITH_PUBLIC_HOST/oauth/bluesky/callback}
            - {name: NOSTR_BRIDGE_BLUESKY_OAUTH_REFRESH_PERIOD, value: 720h}
            - {name: NOSTR_BRIDGE_BLUESKY_OAUTH_REFRESH_CHECK_INTERVAL, value: 24h}
            - {name: NOSTR_BRIDGE_MASTODON_BASE_URL, value: https://REPLACE_WITH_MASTODON_INSTANCE}
            - {name: NOSTR_BRIDGE_MASTODON_ACCOUNT, value: REPLACE_WITH_USER_AT_INSTANCE}
            - {name: NOSTR_BRIDGE_MASTODON_LIST_IDS, value: REPLACE_WITH_COMMA_SEPARATED_LIST_IDS}
            - {name: NOSTR_BRIDGE_MASTODON_BACKFILL_LIMIT, value: "100"}
            - {name: NOSTR_BRIDGE_MASTODON_RECONCILE_INTERVAL, value: 1h}
            - {name: NOSTR_BRIDGE_MASTODON_OAUTH_CALLBACK_URL, value: https://REPLACE_WITH_PUBLIC_HOST/oauth/mastodon/callback}
            - {name: NOSTR_BRIDGE_MASTODON_OAUTH_CLIENT_ID, value: REPLACE_WITH_MASTODON_CLIENT_ID}
            - name: NOSTR_BRIDGE_RELAY_ADMIN_PRIVATE_KEY
              valueFrom: {secretKeyRef: {name: nostr-bridge-secrets, key: relay-admin-private-key}}
            - name: NOSTR_BRIDGE_MASTER_SEED
              valueFrom: {secretKeyRef: {name: nostr-bridge-secrets, key: master-seed}}
            - name: NOSTR_BRIDGE_BLUESKY_OAUTH_CLIENT_SIGNING_KEY
              valueFrom: {secretKeyRef: {name: nostr-bridge-secrets, key: bluesky-oauth-client-signing-key}}
            - name: NOSTR_BRIDGE_BLUESKY_OAUTH_ENCRYPTION_KEY
              valueFrom: {secretKeyRef: {name: nostr-bridge-secrets, key: bluesky-oauth-encryption-key}}
            - name: NOSTR_BRIDGE_MASTODON_OAUTH_CLIENT_SECRET
              valueFrom: {secretKeyRef: {name: nostr-bridge-secrets, key: mastodon-oauth-client-secret}}
            - name: NOSTR_BRIDGE_MASTODON_OAUTH_ENCRYPTION_KEY
              valueFrom: {secretKeyRef: {name: nostr-bridge-secrets, key: mastodon-oauth-encryption-key}}
          readinessProbe:
            httpGet: {path: /readyz, port: http}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /healthz, port: http}
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests: {cpu: 100m, memory: 128Mi}
            limits: {memory: 512Mi}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: [ALL]}
            readOnlyRootFilesystem: true
          volumeMounts:
            - {name: data, mountPath: /var/lib/nostr-bridge}
            - {name: tmp, mountPath: /tmp}
      volumes:
        - name: data
          persistentVolumeClaim: {claimName: nostr-bridge-data}
        - name: tmp
          emptyDir: {}
