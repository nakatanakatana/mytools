# Optional External Secrets Operator example. The operator and SecretStore are
# environment prerequisites; this file does not install or manage either one.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: nostr-bridge-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore # Change to SecretStore when it is namespace-scoped.
    name: REPLACE_WITH_SECRET_STORE_NAME
  target:
    name: nostr-bridge-secrets
    creationPolicy: Owner
  data:
    - secretKey: relay-admin-private-key
      remoteRef: {key: REPLACE_WITH_REMOTE_SECRET_KEY, property: relay-admin-private-key}
    - secretKey: master-seed
      remoteRef: {key: REPLACE_WITH_REMOTE_SECRET_KEY, property: master-seed}
    - secretKey: bluesky-oauth-client-signing-key
      remoteRef: {key: REPLACE_WITH_1PASSWORD_ITEM, property: bluesky-oauth-client-signing-key}
    - secretKey: bluesky-oauth-encryption-key
      remoteRef: {key: REPLACE_WITH_1PASSWORD_ITEM, property: bluesky-oauth-encryption-key}
    - secretKey: mastodon-oauth-client-secret
      remoteRef: {key: REPLACE_WITH_1PASSWORD_ITEM, property: mastodon-oauth-client-secret}
    - secretKey: mastodon-oauth-encryption-key
      remoteRef: {key: REPLACE_WITH_1PASSWORD_ITEM, property: mastodon-oauth-encryption-key}
