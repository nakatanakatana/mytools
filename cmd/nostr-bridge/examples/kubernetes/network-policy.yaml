# Adjust namespace labels and DNS rules for your cluster before applying.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nostr-bridge-ingress
spec:
  podSelector:
    matchLabels: {app.kubernetes.io/name: nostr-bridge}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels: {nostr.networking/bridge-access: "true"}
      ports:
        - {protocol: TCP, port: 8080}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nostr-bridge-egress
spec:
  podSelector:
    matchLabels: {app.kubernetes.io/name: nostr-bridge}
  policyTypes: [Egress]
  egress:
    # Relay protocol and management listeners. Add an appropriate
    # namespaceSelector alongside this podSelector if the relay is elsewhere.
    - to:
        - podSelector:
            matchLabels: {app.kubernetes.io/name: nostr-relay}
      ports:
        - {protocol: TCP, port: 8080}
        - {protocol: TCP, port: 8081}
    - to:
        - namespaceSelector:
            matchLabels: {kubernetes.io/metadata.name: kube-system}
      ports:
        - {protocol: UDP, port: 53}
        - {protocol: TCP, port: 53}
    # NetworkPolicy cannot select public OAuth/provider hosts by DNS name.
    # This permits HTTPS plus Bluesky Jetstream and Mastodon streaming over
    # secure WebSockets (also TCP 443); restrict stable CIDRs when supported.
    - ports:
        - {protocol: TCP, port: 443}
